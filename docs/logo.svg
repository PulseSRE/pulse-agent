<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="agent-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="visor-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <linearGradient id="antenna-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="visor-blur">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#agent-bg)"/>
  <rect x="4" y="4" width="92" height="92" rx="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Antenna -->
  <line x1="50" y1="14" x2="50" y2="24" stroke="url(#antenna-glow)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="50" cy="12" r="3.5" fill="#00f0ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="50" cy="12" r="1.5" fill="white" opacity="0.8"/>

  <!-- Head -->
  <rect x="24" y="24" width="52" height="40" rx="10" fill="rgba(0,0,0,0.3)"/>
  <rect x="24" y="24" width="52" height="40" rx="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Visor (single glowing band) -->
  <rect x="30" y="36" width="40" height="10" rx="5" fill="rgba(0,0,0,0.4)"/>
  <rect x="32" y="38" width="36" height="6" rx="3" fill="url(#visor-glow)" opacity="0.9" filter="url(#visor-blur)"/>

  <!-- Eye dots on visor -->
  <circle cx="40" cy="41" r="2" fill="white" opacity="0.9"/>
  <circle cx="60" cy="41" r="2" fill="white" opacity="0.9"/>

  <!-- Mouth grid (3 small bars) -->
  <rect x="40" y="52" width="4" height="2" rx="1" fill="rgba(0,240,255,0.4)"/>
  <rect x="48" y="52" width="4" height="2" rx="1" fill="rgba(0,240,255,0.4)"/>
  <rect x="56" y="52" width="4" height="2" rx="1" fill="rgba(0,240,255,0.4)"/>

  <!-- Ear nodes -->
  <rect x="16" y="36" width="8" height="12" rx="3" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <rect x="76" y="36" width="8" height="12" rx="3" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <circle cx="20" cy="42" r="1.5" fill="#00ff88" opacity="0.7"/>
  <circle cx="80" cy="42" r="1.5" fill="#00ff88" opacity="0.7"/>

  <!-- Neck -->
  <rect x="44" y="64" width="12" height="6" rx="2" fill="rgba(0,0,0,0.25)"/>

  <!-- Body -->
  <rect x="28" y="70" width="44" height="22" rx="8" fill="rgba(0,0,0,0.3)"/>
  <rect x="28" y="70" width="44" height="22" rx="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

  <!-- Chest light (heartbeat/pulse line) -->
  <polyline
    points="36,81 42,81 44,76 46,86 48,78 50,84 52,81 58,81 64,81"
    fill="none"
    stroke="url(#visor-glow)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.8"
  />

  <!-- Shoulder joints -->
  <circle cx="26" cy="74" r="4" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <circle cx="74" cy="74" r="4" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <circle cx="26" cy="74" r="1.5" fill="#00f0ff" opacity="0.5"/>
  <circle cx="74" cy="74" r="1.5" fill="#00f0ff" opacity="0.5"/>
</svg>

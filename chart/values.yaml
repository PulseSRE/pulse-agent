replicaCount: 1

image:
  repository: quay.io/yourorg/openshift-sre-agent
  tag: "0.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Vertex AI configuration
vertexAI:
  projectId: ""
  region: ""

  # Reference a pre-created secret containing the GCP service account key
  existingSecret: ""
  existingSecretKey: "key.json"

# Direct Anthropic API (alternative to Vertex AI)
# anthropicApiKey:
#   existingSecret: ""
#   existingSecretKey: "api-key"

# RBAC — controls what the agent can do on the cluster
rbac:
  create: true
  allowWriteOperations: false
  allowSecretAccess: false

# Self-improving memory system
memory:
  enabled: false
  dbPath: "/tmp/pulse_agent/memory.db"
  # For persistent memory across pod restarts, enable a PVC
  persistence:
    enabled: false
    storageClass: ""
    size: 1Gi

# WebSocket authentication
wsAuth:
  # Set a token for WebSocket authentication
  # Create with: kubectl create secret generic pulse-ws-token --from-literal=token=your-secret-token
  existingSecret: ""
  secretKey: "token"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

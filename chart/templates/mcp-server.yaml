{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-agent.fullname" . }}-mcp
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sre-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        {{- include "sre-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: {{ include "sre-agent.fullname" . }}
      containers:
        - name: mcp-server
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy | default "Always" }}
          args:
            - --port
            - "8081"
            - --toolsets
            - {{ join "," .Values.mcp.toolsets }}
            - --cluster-provider
            - in-cluster
            - --stateless
          ports:
            - containerPort: 8081
              name: sse
          readinessProbe:
            httpGet:
              path: /healthz
              port: sse
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: sse
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sre-agent.fullname" . }}-mcp
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  selector:
    {{- include "sre-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
  ports:
    - port: 8081
      targetPort: sse
      name: sse
{{- end }}

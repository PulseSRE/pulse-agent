apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-agent.fullname" . }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sre-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sre-agent.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sre-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.vertexAI.projectId | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.vertexAI.region | quote }}
            {{- if .Values.vertexAI.existingSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
            {{- end }}
            {{- if .Values.memory.enabled }}
            - name: PULSE_AGENT_MEMORY
              value: "1"
            - name: PULSE_AGENT_MEMORY_PATH
              value: {{ .Values.memory.dbPath | quote }}
            {{- end }}
            {{- if .Values.wsAuth.existingSecret }}
            - name: PULSE_AGENT_WS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.wsAuth.existingSecret }}
                  key: {{ .Values.wsAuth.secretKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.vertexAI.existingSecret }}
            - name: gcp-sa-key
              mountPath: /var/secrets/google
              readOnly: true
            {{- end }}
            {{- if and .Values.memory.enabled .Values.memory.persistence.enabled }}
            - name: memory-data
              mountPath: {{ dir .Values.memory.dbPath }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.vertexAI.existingSecret }}
        - name: gcp-sa-key
          secret:
            secretName: {{ .Values.vertexAI.existingSecret }}
        {{- end }}
        {{- if and .Values.memory.enabled .Values.memory.persistence.enabled }}
        - name: memory-data
          persistentVolumeClaim:
            claimName: {{ include "sre-agent.fullname" . }}-memory
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- if not .Values.wsAuth.existingSecret }}
{{/*
Auto-generate a WS auth token secret when no existingSecret is provided.
Uses lookup() to preserve existing token on upgrades (more reliable than resource-policy alone).
Both the agent (this chart) and the UI (openshiftpulse chart) reference this secret.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sre-agent.wsTokenSecretName" . }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- $secretName := include "sre-agent.wsTokenSecretName" . }}
  {{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
  {{- $key := .Values.wsAuth.secretKey }}
  {{- $token := randAlphaNum 32 }}
  {{- if $existing }}
    {{- $existingToken := index $existing.data $key }}
    {{- if $existingToken }}
      {{- $token = $existingToken }}
    {{- end }}
  {{- end }}
  {{ $key }}: {{ $token | b64enc | quote }}
{{- end }}

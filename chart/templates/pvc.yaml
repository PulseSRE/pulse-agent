{{- if and .Values.memory.enabled .Values.memory.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sre-agent.fullname" . }}-memory
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.memory.persistence.storageClass }}
  storageClassName: {{ .Values.memory.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.memory.persistence.size }}
{{- end }}

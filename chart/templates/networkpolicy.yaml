{{- if and .Values.rbac.create (not .Values.networkPolicy.disabled) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sre-agent.fullname" . }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sre-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow WebSocket/HTTP traffic from Pulse frontend on port 8080
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to Kubernetes API and Claude API (Vertex AI)
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
